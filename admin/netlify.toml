# Netlify config for the JG Foods ADMIN site.
# If the admin site's "base directory" in Netlify is set to `admin`,
# this file is picked up automatically and the functions directory
# below is relative to that base.
#
# Functions need the ANTHROPIC_API_KEY environment variable set in
# the admin site's Netlify settings to enable AI post generation.
# Without it, generate-post returns 503 and the admin uses its
# built-in template fallback.

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
